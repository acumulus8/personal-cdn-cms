  domain: String
  host: String
  id: Int
  name: String
  pages: [Page!]
  projectId: Int
  slug: String
  type: String
}

enum SiteType {
  BLOG
  ECOMMERCE
  OTHER
  PORTFOLIO
  WEB_APP
}

